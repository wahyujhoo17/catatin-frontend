<script>
        // Micro-interaction for input hover effects
        document.querySelectorAll('.input-glass').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Atmospheric mouse track effect (Subtle)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const spheres = document.querySelectorAll('.ambient-sphere');
            
            spheres.forEach((sphere, idx) => {
                const moveX = (x - 0.5) * (20 * (idx + 1));
                const moveY = (y - 0.5) * (20 * (idx + 1));
                sphere.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
