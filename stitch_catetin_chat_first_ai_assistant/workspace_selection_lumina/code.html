<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('.workspace-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                const isPersonal = card.querySelector('.text-primary');
                if (isPersonal) {
                    card.classList.add('active-glow-personal');
                } else {
                    card.classList.add('active-glow-pos');
                }
            });
            card.addEventListener('mouseleave', () => {
                card.classList.remove('active-glow-personal', 'active-glow-pos');
            });
        });
    </script>
