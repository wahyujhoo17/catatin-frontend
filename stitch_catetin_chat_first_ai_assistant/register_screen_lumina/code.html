<style>
    body {
      background-color: #fdf7ff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(73, 69, 81, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-input:focus {
      outline: none;
      border-color: #4f378a;
      box-shadow: 0 0 0 4px rgba(79, 55, 138, 0.1);
      background: rgba(255, 255, 255, 1);
    }

    .primary-gradient {
      background: linear-gradient(135deg, #6750a4 0%, #4f378a 100%);
      box-shadow: 0 4px 15px rgba(79, 55, 138, 0.2);
    }

    .primary-gradient:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .mesh-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(at 0% 0%, rgba(207, 188, 255, 0.3) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(225, 212, 253, 0.3) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(233, 221, 255, 0.2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(207, 188, 255, 0.2) 0px, transparent 50%);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .active-icon {
      font-variation-settings: 'FILL' 1;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-body-md text-on-surface selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<div class="mesh-gradient"></div>
<main class="min-h-screen flex flex-col items-center justify-center px-container-margin py-stack-gap-lg">
<div class="w-full max-w-md space-y-stack-gap-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="text-center space-y-inline-gap">
<div class="inline-flex items-center justify-center p-3 rounded-2xl glass-panel mb-4">
<span class="material-symbols-outlined text-primary text-[32px] active-icon">account_balance_wallet</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Mulai Catat Sekarang</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Satu akun untuk semua kebutuhan finansialmu</p>
</div>
<form class="glass-panel rounded-[24px] p-card-padding space-y-stack-gap-md" onsubmit="event.preventDefault()">
<div class="space-y-inline-gap">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="name">NAMA LENGKAP</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 font-body-md text-body-md placeholder:text-outline" id="name" placeholder="Budi Santoso" type="text"/>
</div>
</div>
<div class="space-y-inline-gap">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">EMAIL ATAU NOMOR TELEPON</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">alternate_email</span>
<input class="glass-input w-full rounded-xl py-3.5 pl-12 pr-4 font-body-md text-body-md placeholder:text-outline" id="email" placeholder="contoh@email.com" type="text"/>
</div>
</div>
<div class="space-y-inline-gap">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="glass-input w-full rounded-xl py-3.5 pl-12 pr-12 font-body-md text-body-md placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-3 py-2">
<div class="relative flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="terms">
            Saya menyetujui <span class="text-primary font-semibold">Syarat &amp; Ketentuan</span> serta <span class="text-primary font-semibold">Kebijakan Privasi</span> yang berlaku.
          </label>
</div>
<button class="primary-gradient w-full py-4 rounded-xl font-headline-sm text-headline-sm text-on-primary transition-all hover:brightness-110 active:scale-95" type="submit">
          Daftar
        </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-md text-label-md text-outline">ATAU DAFTAR DENGAN</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-stack-gap-sm">
<button class="glass-panel flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-white transition-colors" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmHJA1HzgjwuHdK_dJUCQX3vU8IIig7-sahCgmQFxACdWMzKq7IrPTPAoNrB9DtlBvWy8Jd-CaFVoSwqqzrqQshfIU0xb0d4d75LHAuIij43nPyOmniAd-heH8p6EvyCMBHhexV6nLHKCWs4kw90uWuqAMRLKmQMbqyqvieKQOnC3QiEXWk2k6QCa29AsUWWF0WMMa32Cytn2TrtFdN3kIefdKI5xeLRNpljEkn9WgvbrJMqyUdZD3RRuupcgK3xqTba_0zwTjVVI"/>
<span class="font-label-md text-label-md text-on-surface">Google</span>
</button>
<button class="glass-panel flex items-center justify-center gap-2 py-3 rounded-xl hover:bg-white transition-colors" type="button">
<span class="material-symbols-outlined text-on-surface">apps</span>
<span class="font-label-md text-label-md text-on-surface">Apple</span>
</button>
</div>
</form>
<p class="text-center font-body-md text-body-md text-on-surface-variant">
        Sudah punya akun? 
        <a class="text-primary font-semibold hover:underline decoration-primary-container decoration-2 underline-offset-4 transition-all" href="#">Masuk</a>
</p>
</div>
</main>
<!-- Visual Background Decoration -->
<div class="fixed top-20 -right-20 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -bottom-20 -left-20 w-80 h-80 bg-secondary/10 rounded-full blur-[100px] pointer-events-none"></div>
<script>
    // Micro-interaction for input hover/focus states
    const inputs = document.querySelectorAll('.glass-input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.querySelector('.material-symbols-outlined').style.color = '#4f378a';
      });
      input.addEventListener('blur', () => {
        if (!input.value) {
          input.parentElement.querySelector('.material-symbols-outlined').style.color = '#7a7582';
        }
      });
    });

    // Password visibility toggle
    const togglePass = document.querySelector('button .material-symbols-outlined:contains("visibility")');
    if (togglePass) {
        togglePass.parentElement.addEventListener('click', () => {
            const input = document.getElementById('password');
            if (input.type === 'password') {
                input.type = 'text';
                togglePass.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                togglePass.textContent = 'visibility';
            }
        });
    }
  </script>
</body></html>
