<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#48C9B0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Stylized "C" letterform made of financial chart bars -->
  <!-- Bar 1 (top) -->
  <rect x="148" y="148" width="28" height="52" rx="6" fill="url(#accent)" opacity="0.6"/>
  <!-- Bar 2 -->
  <rect x="186" y="132" width="28" height="68" rx="6" fill="url(#accent)" opacity="0.75"/>
  <!-- Bar 3 -->
  <rect x="224" y="112" width="32" height="88" rx="7" fill="url(#accent)" opacity="0.9"/>
  <!-- Bar 4 (right side - tall) -->
  <rect x="266" y="98" width="28" height="102" rx="6" fill="url(#accent)" opacity="0.75"/>
  <!-- Bar 5 -->
  <rect x="304" y="120" width="28" height="80" rx="6" fill="url(#accent)" opacity="0.65"/>
  <!-- Bar 6 -->
  <rect x="342" y="140" width="28" height="60" rx="6" fill="url(#accent)" opacity="0.55"/>

  <!-- Trendline connecting bar tops -->
  <polyline points="162,148 200,132 240,112 280,98 318,120 356,140"
    fill="none" stroke="#48C9B0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Upward arrow at end -->
  <polygon points="356,140 348,152 352,148 364,134"
    fill="#48C9B0" opacity="0.9"/>
  <line x1="356" y1="140" x2="364" y2="130" stroke="#48C9B0" stroke-width="3" stroke-linecap="round"/>

  <!-- Small dot decoration -->
  <circle cx="162" cy="148" r="5" fill="#6C63FF"/>
  <circle cx="280" cy="98" r="5" fill="#48C9B0"/>

  <!-- App name at bottom -->
  <text x="256" y="420" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="64" font-weight="700" letter-spacing="8"
    fill="white" opacity="0.9">CATATIN</text>

  <!-- Subtitle -->
  <text x="256" y="452" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="18" font-weight="400" letter-spacing="6"
    fill="rgba(255,255,255,0.45)">KEUANGAN PINTAR</text>
</svg>
